<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MGA</title>
    <style>
      * {
        padding: 0;
        border: 0;
        margin: 0;
      }
      #screen {
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      img.img-main {
        max-height: 100%;
        max-width: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
      }
      div.page-num {
        position: absolute;
        top: 0;
        left: 0;
        padding: 10px;
        height: 20px;
        width: 60px;
        background-color: black;
        color: white;
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #thumbnail-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 350px;
        background-color: rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      #thumbnail-list {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 6px;
        overflow-x: scroll;
        height: 300px;
      }
      #thumbnail-container-header {
        height: 50px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }
      #btnThumbnailClose {
        width: 50px;
        height: 50px;
        background-color: gray;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="screen">
      <img id="mainImg" class="img-main" />
      <div class="page-num"><span id="pageNum">1</span></div>
      <div id="thumbnail-container">
        <div id="thumbnail-container-header">
          <button id="btnThumbnailClose">X</button>
        </div>
        <ul id="thumbnail-list"></ul>
      </div>
    </div>
    <script src="files.js"></script>
    <script>
      let index = 0;
      const total = files.length;
      function init() {
        window.onkeydown = (e) => {
          console.log(e);
          if (e.key == "PageDown") {
            index += 1;
            if (total - 1 <= index) {
              index = total - 1;
            }
          }
          if (e.key == "Home") {
            index = 0;
          }
          if (e.key == "End") {
            index = files.length - 1;
          }
          if (e.key == "PageUp") {
            index -= 1;
            if (index <= 0) {
              index = 0;
            }
          }
          render();
        };

        render();
        renderThumbnails();
      }

      function pageDown() {
        index += 1;
      }

      function render() {
        document.getElementById("pageNum").innerText = `${
          parseInt(index) + 1
        }/${total}`;
        document.getElementById("mainImg").src = files[index].resized;
      }

      function renderThumbnails() {
        const thumbnailImages = files.map((file) =>
          thumbnailImage(file.thumbnail)
        );
        const thumbnailList = document.getElementById("thumbnail-list");

        for (let i = 0; i < thumbnailImages.length; i++) {
          const li = document.createElement("li");
          li.appendChild(thumbnailImages[i]);
          li.addEventListener("click", () => {
            index = i;
            render();
          });
          thumbnailList.appendChild(li);
        }
      }

      function thumbnailImage(src) {
        const img = new Image();
        img.src = src;
        return img;
      }
      init();
    </script>
  </body>
</html>
