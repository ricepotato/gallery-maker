<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MGA</title>
    <style>
      * {
        padding: 0;
        border: 0;
        margin: 0;
      }
      #screen {
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
        overflow-y: hidden;
      }
      img.img-main {
        max-height: 100%;
        max-width: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
      }
      div.page-num {
        position: absolute;
        top: 0;
        left: 0;
        padding: 10px;
        height: 20px;
        width: 60px;
        background-color: white;
        color: black;
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #btnGrid {
        position: absolute;
        bottom: 16px;
        right: 16px;
        width: 50px;
        height: 50px;
        background-color: rgba(80, 80, 80, 0.85);
        color: white;
        font-size: 22px;
        cursor: pointer;
        border-radius: 6px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Full-screen grid overlay */
      #grid-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.92);
        z-index: 100;
        display: none;
        flex-direction: column;
      }
      #grid-overlay.open {
        display: flex;
      }
      #grid-header {
        height: 50px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: 0 16px;
        flex-shrink: 0;
      }
      #btnCloseGrid {
        width: 44px;
        height: 44px;
        background-color: rgba(80, 80, 80, 0.85);
        color: white;
        font-size: 22px;
        cursor: pointer;
        border-radius: 6px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #grid-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 12px 12px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 6px;
        align-content: start;
      }
      #grid-list .grid-item {
        aspect-ratio: 1;
        overflow: hidden;
        cursor: pointer;
        border: 3px solid transparent;
        border-radius: 4px;
        transition: border-color 0.2s ease;
      }
      #grid-list .grid-item.active {
        border-color: #ffffff;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
      }
      #grid-list .grid-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="screen">
      <img id="mainImg" class="img-main" />
      <div class="page-num"><span id="pageNum">1</span></div>
      <button id="btnGrid" title="그리드 보기">⊞</button>
    </div>

    <!-- Full-screen grid overlay -->
    <div id="grid-overlay">
      <div id="grid-header">
        <button id="btnCloseGrid" title="닫기">✕</button>
      </div>
      <div id="grid-list"></div>
    </div>

    <script src="files.js"></script>
    <script>
      let index = 0;
      const total = files.length;

      function init() {
        window.onkeydown = (e) => {
          if (e.key === "PageDown") {
            index = Math.min(index + 1, total - 1);
            render();
          } else if (e.key === "PageUp") {
            index = Math.max(index - 1, 0);
            render();
          } else if (e.key === "Home") {
            index = 0;
            render();
          } else if (e.key === "End") {
            index = total - 1;
            render();
          } else if (e.key === "Escape") {
            closeGrid();
          }
        };

        renderGrid();
        render();

        document.getElementById("btnGrid").addEventListener("click", openGrid);
        document.getElementById("btnCloseGrid").addEventListener("click", closeGrid);
      }

      function render() {
        document.getElementById("pageNum").innerText = `${index + 1}/${total}`;
        document.getElementById("mainImg").src = files[index].resized;

        document.querySelectorAll("#grid-list .grid-item").forEach((item, i) => {
          item.classList.toggle("active", i === index);
        });
      }

      function renderGrid() {
        const gridList = document.getElementById("grid-list");
        files.forEach((file, i) => {
          const div = document.createElement("div");
          div.className = "grid-item";

          const img = new Image();
          img.src = file.thumbnail;
          img.alt = file.original;

          div.appendChild(img);
          div.addEventListener("click", () => {
            index = i;
            render();
            closeGrid();
          });

          gridList.appendChild(div);
        });
      }

      function openGrid() {
        document.getElementById("grid-overlay").classList.add("open");
        // scroll active item into view
        const active = document.querySelector("#grid-list .grid-item.active");
        if (active) active.scrollIntoView({ block: "center" });
      }

      function closeGrid() {
        document.getElementById("grid-overlay").classList.remove("open");
      }

      init();
    </script>
  </body>
</html>
