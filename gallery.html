<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MGA</title>
    <style>
      * {
        padding: 0;
        border: 0;
        margin: 0;
      }
      #screen {
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
        overflow-y: hidden;
      }
      img.img-main {
        max-height: 100%;
        max-width: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
      }
      div.page-num {
        position: absolute;
        top: 0;
        left: 0;
        padding: 10px;
        height: 20px;
        width: 60px;
        background-color: white;
        color: black;
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #thumbnail-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 350px;
        background-color: rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      #thumbnail-list {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 6px;
        overflow-x: scroll;
        height: 300px;
      }
      #thumbnail-container-header {
        height: 50px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }
      #btnThumbnail {
        width: 50px;
        height: 50px;
        background-color: gray;
        color: white;
        cursor: pointer;
      }
      #thumbnail-list img {
        cursor: pointer;
        border: 2px solid transparent;
        transition: border-color 0.3s ease;
      }
      #thumbnail-list img.active {
        border-color: #ffffff;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      }
    </style>
  </head>
  <body>
    <div id="screen">
      <img id="mainImg" class="img-main" />
      <div class="page-num"><span id="pageNum">1</span></div>
      <div id="thumbnail-container">
        <div id="thumbnail-container-header"></div>
        <ul id="thumbnail-list"></ul>
      </div>
    </div>
    <script src="files.js"></script>
    <script>
      let index = 0;
      let isThumbnailOpen = false;
      const total = files.length;
      function init() {
        window.onkeydown = (e) => {
          if (e.key == "PageDown") {
            index += 1;
            if (total - 1 <= index) {
              index = total - 1;
            }
          }
          if (e.key == "Home") {
            index = 0;
          }
          if (e.key == "End") {
            index = files.length - 1;
          }
          if (e.key == "PageUp") {
            index -= 1;
            if (index <= 0) {
              index = 0;
            }
          }
          render();
        };

        render();
        renderThumbnails();
        const button = toogleButton();
        document
          .getElementById("thumbnail-container-header")
          .appendChild(button);
      }

      function pageDown() {
        index += 1;
      }

      function render() {
        document.getElementById("pageNum").innerText = `${
          parseInt(index) + 1
        }/${total}`;
        document.getElementById("mainImg").src = files[index].resized;

        // Update thumbnail active state
        const thumbnails = document.querySelectorAll("#thumbnail-list img");
        thumbnails.forEach((thumb, i) => {
          if (i === index) {
            thumb.classList.add("active");
          } else {
            thumb.classList.remove("active");
          }
        });
      }

      function renderThumbnails() {
        const thumbnailImages = files.map((file) =>
          thumbnailImage(file.thumbnail)
        );
        const thumbnailList = document.getElementById("thumbnail-list");

        for (let i = 0; i < thumbnailImages.length; i++) {
          const li = document.createElement("li");
          li.appendChild(thumbnailImages[i]);
          li.addEventListener("click", () => {
            index = i;
            render();
          });
          thumbnailList.appendChild(li);
        }
      }

      function thumbnailImage(thumbnail) {
        const img = new Image();
        img.src = thumbnail;
        img.alt = thumbnail;
        return img;
      }

      function toogleButton() {
        const button = document.createElement("button");
        button.innerText = "닫기";
        button.id = "btnThumbnail";

        function hideThumbnail() {
          document.getElementById("thumbnail-container").style.bottom =
            "-300px";
          button.removeEventListener("click", hideThumbnail);
          button.addEventListener("click", showThumbnail);
          button.innerText = "열기";
        }

        function showThumbnail() {
          document.getElementById("thumbnail-container").style.bottom = "0px";
          button.removeEventListener("click", showThumbnail);
          button.addEventListener("click", hideThumbnail);
          button.innerText = "닫기";
        }
        button.addEventListener("click", hideThumbnail);
        return button;
      }
      init();
    </script>
  </body>
</html>
